<html>
<head>
    <style>
        body { 
            background-color: #000080; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            /* Запрет синего выделения при кликах */
            user-select: none; 
            -webkit-user-select: none;
        }

        /* Верхняя панель со статистикой */
        .stat-box { 
            font-size: 20px; 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-bottom: 2px solid white;
            text-align: center;
        }

        /* Основной контейнер (центр и бока) */
        .game-container {
            display: flex;
            flex: 1;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        /* Центральная зона (Клик и Ребирт под ним) */
        .center-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        /* Правая зона (Магазин) */
        .shop-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 380px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        /* Стили кнопок */
        button { 
            padding: 15px 25px; 
            font-size: 18px; 
            cursor: pointer; 
            border-radius: 12px;
            border: 2px solid white;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }

        #clickBtn { 
            background-color: #00ff00; 
            color: black; 
            width: 220px; 
            height: 110px; 
            font-size: 28px; 
            font-weight: bold;
        }
        .shop-btn { background-color: #ffffff; color: black; font-size: 16px; }
        .rebirth-btn { background-color: #ff4500; color: white; width: 220px; }
    </style>
</head>
<body>

    <div class="stat-box">
        <h1>Клик: <span id="Click">0</span></h1>
        <div>Сила клика: <span id="pwr">1</span> | Множитель: x<span id="mult">1</span> | Ребирты: <span id="reb">0</span></div>
    </div>
    
    <div class="game-container">
        <div style="width: 280px;"></div>

        <div class="center-area">
            <button id="clickBtn">КЛИК!</button>
            <button id="rebBtn" class="rebirth-btn">РЕБИРТ (Цена: 1k)<br><small>Умножает доход х2</small></button>
        </div>

        <div class="shop-area">
            <h2>Магазин</h2>
            <button id="upg1" class="shop-btn">Улучшение +1 (Цена: 10)</button>
            <button id="upg2" class="shop-btn">Улучшение +5 (Цена: 100)</button>
        </div>
    </div>

<script>
    // --- ПЕРЕМЕННЫЕ ИГРЫ ---
    let Click = 0;
    let clickPower = 1;
    let rebirths = 0;
    let multiplier = 1;

    let upg1Price = 10;
    let upg2Price = 100;
    let rebirthPrice = 1000;

    // Элементы экрана
    const display = document.getElementById('Click');
    const pwrDisplay = document.getElementById('pwr');
    const rebDisplay = document.getElementById('reb');
    const multDisplay = document.getElementById('mult');

    // ФУНКЦИЯ СОКРАЩЕНИЯ ЧИСЕЛ (1k, 1M, 1B)
    function format(num) {
        if (num >= 1000000000) return (num / 1000000000).toFixed(2) + 'B';
        if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
        return Math.floor(num);
    }

    // --- 1. ЛОГИКА КЛИКА ---
    document.getElementById('clickBtn').onclick = function() {
        Click = Click + (clickPower * multiplier);
        updateUI();
    };

    // --- 2. УЛУЧШЕНИЕ 1 ---
    document.getElementById('upg1').onclick = function() {
        if (Click >= upg1Price) {
            Click -= upg1Price;
            clickPower += 1;
            upg1Price = Math.floor(upg1Price * 1.5); 
            this.innerHTML = "Улучшение +1 (Цена: " + format(upg1Price) + ")";
            updateUI();
        }
    };

    // --- 3. УЛУЧШЕНИЕ 2 ---
    document.getElementById('upg2').onclick = function() {
        if (Click >= upg2Price) {
            Click -= upg2Price;
            clickPower += 5;
            upg2Price = Math.floor(upg2Price * 1.8);
            this.innerHTML = "Улучшение +5 (Цена: " + format(upg2Price) + ")";
            updateUI();
        }
    };

    // --- 4. РЕБИРТ ---
    document.getElementById('rebBtn').onclick = function() {
        if (Click >= rebirthPrice) {
            Click = 0;
            clickPower = 1;
            rebirths += 1;
            multiplier *= 2;
            rebirthPrice *= 10; // Увеличиваем цену ребирта в 10 раз
            
            // Сброс цен в магазине (по желанию)
            upg1Price = 10;
            upg2Price = 100;
            document.getElementById('upg1').innerHTML = "Улучшение +1 (Цена: 10)";
            document.getElementById('upg2').innerHTML = "Улучшение +5 (Цена: 100)";
            
            this.innerHTML = "РЕБИРТ (Цена: " + format(rebirthPrice) + ")<br><small>Умножает доход х2</small>";
            updateUI();
        } else {
            alert("Нужно " + format(rebirthPrice) + " очков!");
        }
    };

    function updateUI() {
        display.innerText = format(Click);
        pwrDisplay.innerText = format(clickPower);
        rebDisplay.innerText = rebirths;
        multDisplay.innerText = multiplier;
    }

    // Запускаем обновление при загрузке, чтобы k, M, B применились сразу
    updateUI();
</script>
</body>
</html>
