<html>
<body>
<style>
  body { 
    background-color: #000080; /* Тот самый темно-синий цвет */
    color: white;              /* Белый текст, чтобы было видно */
    font-family: sans-serif; 
    text-align: center; 
  }
  button { padding: 10px 20px; font-size: 18px; cursor: pointer; }
</style>

<h1>Очков: <span id="count">0</span></h1>
<button id="clickBtn">Кликни меня!</button>

<hr> <h3>Магазин</h3>
<button id="upgradeBtn">Купить +1 к клику (Цена: 10)</button>

<script>
  let score = 0;
  let clickPower = 1; // Вот она — сила твоего клика!

  const display = document.getElementById('count');
  const btnClick = document.getElementById('clickBtn');
  const btnUpgrade = document.getElementById('upgradeBtn');

  // Логика обычного клика
  btnClick.onclick = function() {
    score = score + clickPower; // Прибавляем силу клика, а не просто 1
    display.innerText = score;
  };

  // Логика покупки улучшения
  btnUpgrade.onclick = function() {
    if (score >= 10) {          // Если денег хватает (больше или равно 10)
      score = score - 10;       // Забираем деньги
      clickPower = clickPower + 1; // Увеличиваем силу клика
      
      // Обновляем текст на экране
      display.innerText = score;
      alert("Улучшение куплено! Теперь клик дает больше.");
    } else {
      alert("Недостаточно очков!");
    }
  };
</script>
</script>
</html>
