<html>
<head>
    <style>
        body { 
            background-color: #000080; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            /* Запрет синего выделения при кликах */
            user-select: none; 
            -webkit-user-select: none;
        }

        /* Верхняя панель со статистикой */
        .stat-box { 
            font-size: 20px; 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-bottom: 2px solid white;
            text-align: center;
        }

        /* Основной контейнер (центр и бока) */
        .game-container {
            display: flex;
            flex: 1;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        /* Центральная зона (Клик и Ребирт под ним) */
        .center-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        /* Правая зона (Магазин) */
        .shop-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 280px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        /* Стили кнопок */
        button { 
            padding: 15px 25px; 
            font-size: 18px; 
            cursor: pointer; 
            border-radius: 12px;
            border: 2px solid white;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }

        #clickBtn { 
            background-color: #00ff00; 
            color: black; 
            width: 220px; 
            height: 110px; 
            font-size: 28px; 
            font-weight: bold;
        }
        .shop-btn { background-color: #ffffff; color: black; font-size: 16px; }
        .rebirth-btn { background-color: #ff4500; color: white; width: 220px; }
    </style>
</head>

    </div>

    </div>
